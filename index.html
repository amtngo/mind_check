<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mind_check</title>

<style>
body { font-family: Arial; max-width: 500px; margin:auto; padding:20px;}
.option { padding:10px; border:1px solid #ddd; margin:8px 0; border-radius:8px; cursor:pointer;}
.option:hover { background:#f5f5f5;}
#result { display:none; margin-top:20px;}
</style>
</head>

<body>

<h2 id="title"></h2>
<div id="quiz"></div>

<div id="result">
<div id="resultText"></div>
</div>

<script src="questions.js"></script>

<script>

// 🔥 Supabase 정보
const SUPABASE_URL = "https://ejaibogjqrtfhfnutvdd.supabase.co";
const API_KEY = "sb_publishable_W8EKcWJtoqceQA05o7gZdA_GgSFMtHw";

const questions = getQuestionSet();

let current = 0;
let scores = [0,0,0,0];

// 문제 출력
function showQuestion() {
  const q = questions[current];
  document.getElementById("title").innerText = q.question;

  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  q.options.forEach(opt => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt.text;
    div.onclick = () => selectOption(opt.score);
    quiz.appendChild(div);
  });
}

// 선택 처리
function selectOption(score) {
  const group = Math.floor(current / 3);
  scores[group] += score;

  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

// 결과 처리 (핵심)
async function showResult() {

  document.getElementById("quiz").style.display = "none";
  document.getElementById("title").innerText = "";

  // 🔥 URL에서 코드 가져오기
  const code = new URLSearchParams(location.search).get("code");

  // 🔥 결과 데이터
  const answers = { scores };

  try {

    // 1️⃣ DB 저장
    await fetch(SUPABASE_URL + "/rest/v1/responses", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": API_KEY,
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        code: code,
        answers: answers
      })
    });

    console.log("DB 저장 성공");

    // 2️⃣ 🔥 메일 전송 (핵심 추가)
    await fetch("/.netlify/functions/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        code: code,
        answers: answers
      })
    });

    console.log("메일 전송 요청 완료");

  } catch (e) {
    console.error("에러 발생", e);
  }

  // 결과 메시지
  const resultText = `
  응답이 정상적으로 접수되었습니다.<br><br>
  작성해주신 내용은 상담사가 직접 확인하며,<br>
  확인 후 순차적으로 연락드릴 예정입니다.
  `;

  document.getElementById("resultText").innerHTML = resultText;
  document.getElementById("result").style.display = "block";
}

showQuestion();

</script>

</body>
</html>
