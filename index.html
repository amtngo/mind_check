<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초기 상태 확인</title>

<script src="questions.js?v=7"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  background: #fff;
  padding: 22px;
  border-radius: 12px;
  text-align: center;
  box-sizing: border-box;
}

#progress {
  font-size: 14px;
  color: #777;
  margin-bottom: 12px;
}

#q {
  font-size: 18px;
  line-height: 1.5;
  margin-bottom: 22px;
  white-space: pre-line;
}

#opts {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 8px;
  background: #eeeeee;
  font-size: 16px;
  cursor: pointer;
}

button:active {
  background: #dddddd;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.message h2 {
  font-size: 22px;
  margin-bottom: 12px;
}

.message p {
  font-size: 17px;
  line-height: 1.6;
  color: #333;
}
</style>
</head>

<body>

<div class="container" id="app">
  <div id="progress"></div>
  <h3 id="q">로딩 중...</h3>
  <div id="opts"></div>
</div>

<script>
const params = new URLSearchParams(location.search);

const code = params.get("code") || "";
const type = params.get("type") || "A";

let questions = [];
let index = 0;
let answers = [];
let locked = false;

function showMessage(title, text) {
  document.getElementById("app").innerHTML = `
    <div class="message">
      <h2>${title}</h2>
      <p>${text}</p>
    </div>
  `;
}

function loadQuestions() {
  if (window.getQuestionSet) {
    return window.getQuestionSet(type);
  }

  if (window.questionSets && window.questionSets[type]) {
    return window.questionSets[type];
  }

  if (window.questionSets && window.questionSets.A) {
    return window.questionSets.A;
  }

  return [];
}

function render() {
  locked = false;

  const q = questions[index];

  if (!q) {
    showMessage("문항 오류", "문항을 불러오지 못했습니다.");
    return;
  }

  document.getElementById("progress").innerText =
    `${index + 1} / ${questions.length}`;

  let text = q.question;

  if (index === questions.length - 1) {
    text = "마지막 질문입니다\n\n" + text;
  }

  document.getElementById("q").innerText = text;

  const box = document.getElementById("opts");
  box.innerHTML = "";

  q.options.forEach((opt) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.innerText = opt.text;

    btn.onclick = () => select(opt);

    box.appendChild(btn);
  });
}

function disableButtons() {
  document.querySelectorAll("button").forEach((btn) => {
    btn.disabled = true;
  });
}

function select(opt) {
  if (locked) return;

  locked = true;
  disableButtons();

  answers.push({
    question: questions[index].id || `Q${index + 1}`,
    selected: String(opt.text),
    score: opt.score ?? null,
    type: opt.type ?? null
  });

  index++;

  if (index < questions.length) {
    setTimeout(render, 250);
  } else {
    submit();
  }
}

async function submit() {
  showMessage("전송 중...", "응답을 접수하고 있습니다.");

  try {
    const res = await fetch(
      "https://iuilyyyzgnzydbvffwrg.supabase.co/functions/v1/submit-survey",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          code: code,
          type: type,
          answers: answers
        })
      }
    );

    console.log("submit status:", res.status);

    showMessage(
      "접수가 완료되었습니다.",
      "상담사가 확인 후 안내드립니다."
    );

  } catch (e) {
    console.log("submit error:", e);

    showMessage(
      "접수가 완료되었습니다.",
      "상담사가 확인 후 안내드립니다."
    );
  }
}

window.onload = function () {
  if (!code) {
    showMessage(
      "유효하지 않은 접근입니다.",
      "상담사가 전달한 링크를 그대로 눌러주세요."
    );
    return;
  }

  questions = loadQuestions();

  if (!questions || questions.length === 0) {
    showMessage(
      "문항이 없습니다.",
      "설문 문항을 불러오지 못했습니다."
    );
    return;
  }

  render();
};
</script>

</body>
</html>
