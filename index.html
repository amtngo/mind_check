<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초기 상태 분석</title>

<script src="questions.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: sans-serif;
  max-width: 520px;
  margin: 40px auto;
  padding: 10px;
}
.btn {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
}
.hidden { display:none; }
#progress {
  margin-bottom: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="app">
  <div id="progress"></div>
  <h2 id="q"></h2>
  <div id="opts"></div>
</div>

<div id="resultBox" class="hidden">
  <h2>접수 완료</h2>
  <p id="resultText"></p>
</div>

<script>

// 🔥 절대 중복 안 생기는 방식
var supabase;

(function(){
  if (!window.supabaseClient) {
    window.supabaseClient = window.supabase.createClient(
      "https://iuilyyyzgnzydbvffwrg.supabase.co",
      "sb_publishable_dujoVOiKC1z4FlXIk70hjA_ZR0m1s75"
    );
  }
  supabase = window.supabaseClient;
})();

// URL code
const params = new URLSearchParams(location.search);
const code = params.get("code");

if (!code) {
  alert("코드 없음");
}

// 질문
const questions = getQuestionSet();

let index = 0;
let scores = [0,0,0,0];
let answers = [];

function render() {
  const q = questions[index];

  document.getElementById("progress").innerText =
    (index+1) + " / " + questions.length;

  document.getElementById("q").innerText = q.question;

  const opts = document.getElementById("opts");
  opts.innerHTML = "";

  q.options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className="btn";
    btn.innerText = opt.text;
    btn.onclick = ()=> select(opt);
    opts.appendChild(btn);
  });
}

function select(opt){
  const group = Math.floor(index/3);
  scores[group] += opt.score;

  answers.push({
    question: questions[index].question,
    selected: opt.text,
    score: opt.score
  });

  index++;

  if(index < questions.length){
    render();
  } else {
    submit();
  }
}

async function submit(){

  const payload = {
    code,
    answers,
    scores
  };

  console.log("payload", payload);

  // DB 저장
  const { error } = await supabase.from('responses').insert([payload]);

  if (error) {
    alert("DB 저장 실패");
    console.error(error);
    return;
  }

  // 메일
  await supabase.functions.invoke("submit-survey", {
    body: payload
  });

  document.getElementById("app").classList.add("hidden");
  document.getElementById("resultBox").classList.remove("hidden");

  document.getElementById("resultText").innerHTML =
    "접수되었습니다.";
}

render();

</script>

</body>
</html>
