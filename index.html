<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내담자 초기 상태 분석</title>

<style>
body {
  font-family: sans-serif;
  background: #f7f7f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.option {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #fafafa;
  cursor: pointer;
}

.option:hover {
  background: #eee;
}

.option:active {
  background: #ddd;
}

.result {
  text-align: center;
  margin-top: 50px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <div id="app" class="card"></div>
</div>

<script src="questions.js"></script>

<script>
// =========================
// 1. 코드 가져오기 (공백 제거)
// =========================
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code")?.trim();

const app = document.getElementById("app");

// =========================
// 2. 코드 없으면 즉시 종료
// =========================
if (!code) {
  app.innerHTML = "<p>유효한 코드가 없습니다</p>";
  throw new Error("code 없음");
}

// =========================
// 3. 질문 데이터
// =========================
const questions = window.getQuestionSet();

let current = 0;
let answers = [];
let locked = false;

// =========================
// 4. 질문 렌더링
// =========================
function renderQuestion() {
  const q = questions[current];

  app.innerHTML = `
    <h2>${q.question}</h2>
    ${q.options.map((opt, i) => `
      <button class="option" onclick="selectOption(${i})">
        ${opt.text}
      </button>
    `).join("")}
  `;
}

// =========================
// 5. 보기 선택
// =========================
function selectOption(index) {
  if (locked) return;
  locked = true;

  answers.push({
    question: "Q" + (current + 1),
    selected: questions[current].options[index].value
  });

  current++;

  setTimeout(() => {
    locked = false;

    if (current < questions.length) {
      renderQuestion();
    } else {
      submit();
    }
  }, 200);
}

// =========================
// 6. 제출
// =========================
async function submit() {

  // 전송 중 UI
  app.innerHTML = `<p>전송 중...</p>`;

  try {
    const res = await fetch("https://iuilyyyzgnzydbvffwrg.supabase.co/functions/v1/submit-survey", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        code: code,
        answers: answers
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "전송 실패");
    }

    // 성공 화면
    app.innerHTML = `
      <div class="result">
        <h3>접수가 완료되었습니다.</h3>
        <p>상담사가 확인 후 연락드립니다.</p>
      </div>
    `;

  } catch (err) {

    console.log(err);

    app.innerHTML = `
      <div class="result">
        <h3>오류 발생</h3>
        <p>${err.message}</p>
      </div>
    `;
  }
}

// =========================
// 7. 시작
// =========================
renderQuestion();

</script>

</body>
</html>
