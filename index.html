<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초기 상태 분석</title>

<script src="questions.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: sans-serif;
  max-width: 520px;
  margin: 40px auto;
}

.btn {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
}

.hidden { display:none; }

#progress {
  margin-bottom: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<div id="app">
  <div id="progress"></div>
  <h2 id="q"></h2>
  <div id="opts"></div>
</div>

<div id="resultBox" class="hidden">
  <h2>접수 완료</h2>
  <p id="resultText"></p>
</div>

<script>

// ✔️ Supabase 연결
const supabase = window.supabase.createClient(
  "https://iuilyyyzgnzydbvffwrg.supabase.co",
  "sb_publishable_dujoVOiKC1z4FlXIk70hjA_ZR0m1s75"
);

const questions = getQuestionSet();

let index = 0;
let scores = [0,0,0,0];
let answers = [];

function render() {
  const q = questions[index];

  document.getElementById("progress").innerText =
    (index+1) + " / " + questions.length;

  document.getElementById("q").innerText = q.question;

  const opts = document.getElementById("opts");
  opts.innerHTML = "";

  q.options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className="btn";
    btn.innerText=opt.text;

    btn.onclick=()=>{
      select(opt);
    };

    opts.appendChild(btn);
  });
}

function select(opt){
  const group = Math.floor(index/3);
  scores[group] += opt.score;

  answers.push({
    question: questions[index].question,
    selected: opt.text,
    score: opt.score
  });

  index++;

  if(index < questions.length){
    render();
  } else {
    submit();
  }
}

// ✔️ 결과 전송 (Supabase Edge Function)
async function submit(){

  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  if(!code){
    alert("잘못된 접근입니다 (코드 없음)");
    return;
  }

  const payload = {
    code: code,
    answers: answers,
    scores: scores
  };

  try {
    const { data, error } = await supabase.functions.invoke("submit-survey", {
      body: payload
    });

    if (error) {
      console.log("에러:", error);
      alert("전송 중 오류가 발생했습니다");
      return;
    }

    console.log("전송 성공:", data);

  } catch(e){
    console.log("전송 실패", e);
    alert("서버 연결 실패");
    return;
  }

  document.getElementById("app").classList.add("hidden");
  document.getElementById("resultBox").classList.remove("hidden");

  document.getElementById("resultText").innerHTML = `
  응답이 접수되었습니다.<br><br>
  상담사가 내용을 확인 후 안내드립니다.
  `;
}

render();

</script>

</body>
</html>
