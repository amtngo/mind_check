<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초기 상태 분석</title>

<script src="questions.js?v=4"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container {
  width:90%;
  max-width:420px;
  background:#fff;
  padding:20px;
  border-radius:12px;
}
#q { font-size:18px; margin-bottom:20px; }
#opts { display:flex; flex-direction:column; gap:10px; }
button {
  padding:14px;
  border:none;
  border-radius:8px;
  background:#eee;
}
</style>
</head>

<body>

<div class="container">
  <h3 id="q">로딩 중...</h3>
  <div id="opts"></div>
</div>

<script>

const params = new URLSearchParams(location.search);
const code = params.get("code");

let questions = [];
let index = 0;
let answers = [];

function loadQuestions(){
  if (window.getQuestionSet) return window.getQuestionSet();
  if (window.questionSets) return questionSets.A;
  return [];
}

function render(){

  const q = questions[index];

  if(!q){
    document.getElementById("q").innerText = "문항 오류";
    return;
  }

  document.getElementById("q").innerText = q.question;

  const box = document.getElementById("opts");
  box.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt.text;
    btn.onclick = () => select(opt);
    box.appendChild(btn);
  });
}

function select(opt){
  answers.push(String(opt.text)); // 안전 변환
  index++;

  if(index < questions.length){
    render();
  } else {
    submit();
  }
}

async function submit(){

  console.log("submit 시작");

  document.body.innerHTML = "<h2>전송 중...</h2>";

  try {

    const safeAnswers = answers.map(v => String(v));

    console.log("전송 데이터:", safeAnswers);

    // ⏱ 5초 제한 (멈춤 방지)
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 5000);

    const res = await fetch(
      "https://iuilyyyzgnzydbvffwrg.supabase.co/functions/v1/submit-survey",
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ code, answers: safeAnswers }),
        signal: controller.signal
      }
    );

    console.log("fetch 완료");

    // 응답 여부 상관없이 완료 처리
    document.body.innerHTML = `
      <div style="text-align:center;padding:40px;">
        <h2>접수가 완료되었습니다.</h2>
        <p>상담사가 확인 후 안내드립니다.</p>
      </div>
    `;

  } catch(e){

    console.log("에러 발생:", e);

    // 🔥 서버 실패해도 UX 유지
    document.body.innerHTML = `
      <div style="text-align:center;padding:40px;">
        <h2>접수가 완료되었습니다.</h2>
        <p>상담사가 확인 후 안내드립니다.</p>
      </div>
    `;
  }
}

window.onload = function(){

  questions = loadQuestions();

  if (!questions || questions.length === 0) {
    document.getElementById("q").innerText = "문항을 불러오지 못했습니다.";
    return;
  }

  render();
};

</script>

</body>
</html>
